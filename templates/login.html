<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Shop-Easy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --amazon-dark: #232f3e;
            --amazon-orange: #ff9900;
        }

        body {
            background-color: #f3f3f3;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .brand-logo {
            color: var(--amazon-orange);
        }

        .btn-login {
            background-color: var(--amazon-orange);
            border: none;
            color: #111;
            font-weight: 600;
        }

        .btn-login:hover {
            background-color: #e68a00;
            color: #111;
        }

        .register-link {
            color: var(--amazon-orange);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">

        <!-- Brand -->
        <div class="text-center mb-4">
            <i class="bi bi-shop fs-1 brand-logo"></i>
            <h4 class="fw-bold mt-2 mb-0">Shop-Easy</h4>
            <p class="text-muted small">Sign in to your account</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning alert-dismissible fade show rounded-3" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-person text-muted"></i>
                    </span>
                    <input type="text" name="username" class="form-control border-start-0 ps-0" placeholder="Enter your username" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <i class="bi bi-lock text-muted"></i>
                    </span>
                    <input type="password" name="password" id="loginPass" class="form-control border-start-0 ps-0" placeholder="Enter your password" required>
                    <button class="btn btn-light border" type="button" onclick="togglePassword('loginPass', 'loginIcon')">
                        <i class="bi bi-eye" id="loginIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-login w-100 py-2 rounded-3">
                Login
            </button>
        </form>

        <hr class="my-4">

        <p class="text-center text-muted small mb-0">
            Don't have an account?
            <a href="{{ url_for('register') }}" class="register-link">Register here</a>
        </p>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("bi-eye", "bi-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("bi-eye-slash", "bi-eye");
            }
        }
    </script>

</body>
</html>
